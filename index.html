    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#0A192F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KazaKamba" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="KazaKamba" />
    <meta name="msapplication-TileColor" content="#0A192F" />
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('kazakamba_settings');
          var settings = stored ? JSON.parse(stored) : {};
          var theme = settings.theme || 'preto';
          if (['branco', 'preto', 'kamba'].includes(theme)) {
            document.documentElement.setAttribute('data-theme', theme);
            var metaTheme = document.querySelector('meta[name="theme-color"]');
            var colors = { branco: '#F8FAFC', preto: '#0A192F', kamba: '#1A1A2E' };
            if (metaTheme) metaTheme.setAttribute('content', colors[theme]);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
